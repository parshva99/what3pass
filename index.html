            let html = '<span class="part-words">' + wordsStr + '</span>';
            if (sym) html += '<span class="part-sym">' + sym + '</span>';
            if (num) html += '<span class="part-num">' + num + '</span>';
            document.getElementById('passDisplay').innerHTML = html;
            updateStrength();
        }

        function updateStrength() {
            const score = (opts.numbers && opts.symbols) ? 3 : (opts.numbers || opts.symbols) ? 2 : 1;
            const cls = ['', 'fair', 'fair', 'strong'];
            const label = ['', 'fair', 'good', 'strong'];
            for (let i = 1; i <= 3; i++) {
                document.getElementById('s' + i).className = 'seg' + (i <= score ? ' ' + cls[score] : '');
            }
            document.getElementById('strengthLabel').textContent = label[score];
        }

        function toggle(key) {
            opts[key] = !opts[key];
            const el = document.getElementById(key === 'numbers' ? 'tNum' : 'tSym');
            el.classList.toggle('on', opts[key]);
            generate();
        }

        function copyPass() {
            if (!currentRaw) return;
            navigator.clipboard.writeText(currentRaw).catch(() => { });
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 1800);
        }

        document.getElementById('wordCount').textContent = wordList.length.toLocaleString() + ' words in dictionary';
        generate();
    </script>
</body>

</html>
